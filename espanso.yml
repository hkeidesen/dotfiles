matches:
  # 🔥 UUID generator
  - trigger: ":uuid"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "uuidgen"

  # 🧠 Git current branch
  - trigger: ":gbranch"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "git rev-parse --abbrev-ref HEAD"

  # 🚀 Vue 3 component skeleton
  - trigger: ":vuecomp"
    replace: |
      <script setup lang="ts">
      
      </script>
      
      <template>
        
      </template>

  # 🧰 Django query
  - trigger: ":djangoqs"
    replace: "Model.objects.filter(field=value)"

  # ⚡ Common CLI shortcuts
  - trigger: ":npmi"
    replace: "pnpm install"

  - trigger: ":shrug"
    replace: "¯\\_(ツ)_/¯"

  - trigger: ":email"
    replace: "hans-kristian.norum@soprasteria.com"

  - trigger: ":lorem"
    replace: "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."

